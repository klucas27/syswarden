# syswarden — balanced profile example
#
# Suitable for a desktop or workstation that you want to stay responsive
# under occasional heavy loads. Enables analysis and recommendations;
# all state-changing actions remain dry-run until you explicitly opt in.
#
# Copy to /etc/syswarden/config.toml and edit as needed.
# Run `syswarden config validate` to check for issues.

[global]
profile = "balanced"
dry_run = true                    # Change to false only after reviewing recommendations
allow_aggressive_actions = false  # Never set true without understanding the consequences
allow_zram_apply = false
allow_sysctl_apply = false
log_level = "info"

[polling]
idle_interval_secs = 8
pressure_interval_secs = 3
min_interval_secs = 2
max_interval_secs = 60
hysteresis_ticks = 3

[pressure.thresholds]
# CPU PSI some-avg10 thresholds (%)
cpu_moderate = 15.0
cpu_high     = 35.0
cpu_critical = 60.0
# Memory PSI thresholds (%)
mem_some_moderate  = 10.0
mem_full_high      = 5.0
mem_full_critical  = 20.0
# IO PSI thresholds (%)
io_moderate = 15.0
io_high     = 35.0
io_critical = 60.0
# MemAvailable below this % of MemTotal triggers pressure cross-check
mem_available_low_pct = 10.0

[protected]
# These processes and services are NEVER touched, regardless of profile or flags.
processes = [
    "systemd", "init", "kthreadd",
    "syswarden",
    "sshd", "dbus-daemon",
]
services = [
    "syswarden.service",
    "dbus.service",
    "NetworkManager.service",
    "sshd.service",
    "systemd-journald.service",
    "systemd-logind.service",
    "systemd-udevd.service",
]

[allowed]
# Services that MAY receive resource-control changes (empty = nothing modifiable).
# Add specific user-space services here if you want syswarden to govern them.
services = []

[history]
dir            = "/var/lib/syswarden/history"
retention_days = 14
max_file_mb    = 32

[logging]
audit_dir = "/var/lib/syswarden/audit"
journald  = true

[rollback]
dir          = "/var/lib/syswarden/rollback"
keep_entries = 100
